name: Latest YouTube Videos

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          comment_tag_name: BLOG-POST-LIST
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCK14FxPR0eZFadp0e7B0M9A"
          max_post_count: 3
          template: "<td align=\"center\" width=\"33%\"><a href=\"$url\"><img src=\"$imageLink\" width=\"260\"><br><sub><b>$title</b></sub></a></td>"
          item_exec: "const m = post.url.match(/(?:v=|shorts\\/)([^&\\s]+)/); if (m) post.imageLink = 'https://img.youtube.com/vi/' + m[1] + '/hqdefault.jpg'; post.title = post.title.length > 55 ? post.title.slice(0, 52) + '...' : post.title;"
