name: Latest YouTube Videos

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          comment_tag_name: BLOG-POST-LIST
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCK14FxPR0eZFadp0e7B0M9A"
          max_post_count: 6
          template: "<a href=\"$url\"><img src=\"$imageLink\" width=\"220\" alt=\"$title\"><br><sub><b>$title</b></sub></a>"
          item_exec: "post.title = post.title.length > 60 ? post.title.slice(0, 57) + '...' : post.title;"
